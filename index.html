<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How Bad Are You at Claude? — Skills Assessment Quiz</title>
<meta name="description" content="A 3-minute diagnostic: find your Claude level, your biggest mistake, and the exact resources to fix it.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='9' fill='%23D97757'/%3E%3Ctext x='16' y='23' font-size='20' text-anchor='middle' fill='white'%3E%E2%9C%B3%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  ::selection{background:rgba(217,119,87,.22)}
  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent}
  input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:99px;background:linear-gradient(90deg,var(--ac,#D97757) 0 var(--fill,50%),var(--line,#E7E3D7) var(--fill,50%) 100%)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;border:2px solid var(--ac,#D97757);box-shadow:0 2px 8px rgba(0,0,0,.14);margin-top:-8px;cursor:grab}
  input[type=range]::-webkit-slider-thumb:active{cursor:grabbing}
  input[type=range]::-moz-range-track{height:6px;border-radius:99px;background:var(--line,#E7E3D7)}
  input[type=range]::-moz-range-progress{height:6px;border-radius:99px;background:var(--ac,#D97757)}
  input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:#fff;border:2px solid var(--ac,#D97757);cursor:grab}
  @keyframes scIn1{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes scIn2{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  @keyframes confFall{0%{opacity:0;transform:translateY(-12px) rotate(0)}12%{opacity:1}100%{opacity:0;transform:translateY(360px) rotate(300deg)}}
  @keyframes badgePop{0%{opacity:0;transform:scale(.5)}62%{transform:scale(1.08)}100%{opacity:1;transform:scale(1)}}
  .cq-opt:active{transform:scale(.992)!important;transition-duration:.06s!important}
  .cq-opt:hover .cq-badge{background:var(--ac,#D97757)!important;color:#fff!important;transform:scale(1.07)}
  .cq-opt:not(.cq-sel):hover{border-color:var(--ac,#D97757)!important;background:var(--soft,#FAF7F1)!important;transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.08)!important}
  .cq-tap{transition:filter .15s,transform .15s,box-shadow .15s}
  .cq-tap:hover{filter:brightness(.94);transform:translateY(-1px)}
  .cq-tap:active{transform:translateY(0) scale(.98)}
  .cq-tap-lift:hover{filter:brightness(.94);transform:translateY(-2px)}
  .cq-tap-bright:hover{filter:brightness(1.08);transform:translateY(-2px)}
  .cq-back:hover{color:var(--ac,#D97757)!important}
  .cq-email:focus{border-color:var(--ac,#D97757)!important;box-shadow:0 0 0 3px rgba(217,119,87,.15)}
  .cq-restart:hover{color:var(--ac,#D97757)!important}
  .cq-restart-o:hover{border-color:var(--ac,#D97757)!important;color:var(--ac,#D97757)!important}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";
(function(){

  // ---- Configuration (from the design's default props) ----
  var PROPS = {
    theme: 'Mono',
    accent: '#D97757',
    cardStyle: 'Elevated',
    progressStyle: 'Stepper',
    serifHeadings: true,
    autoAdvance: true
  };

  // ---- Content ----
  var L = {
    1:{num:1,name:'Barely Scratching the Surface',diag:'You treat Claude like a search box. It can do far more than you’re asking of it.',subject:'Your Claude score: Tourist. Start here.'},
    2:{num:2,name:'You Know It Could Be More',diag:'Sometimes it works, sometimes it doesn’t — and you’re not sure why. That’s the gap.',subject:'Your Claude score: Prompt Gambler. Here’s the fix.'},
    3:{num:3,name:'Still Doing It All Yourself',diag:'You get real work done. But you rebuild everything from scratch every time.',subject:'Your Claude score: Practical Operator. Build the system.'},
    4:{num:4,name:'Miles Ahead of Everyone',diag:'You think in systems and surfaces. You’re ahead of almost everyone.',subject:'Your Claude score: Power User. Build once, reuse weekly.'}
  };

  var GAP = {
    Context:{name:'Setting context',fix:'Open every task with the goal, the audience, and one real example — before you ask for anything.'},
    Voice:{name:'Matching your voice',fix:'Stop describing your tone. Paste three real samples and say “write like these.”'},
    Workflow:{name:'Building a system',fix:'Move anything you repeat into a Project — files, instructions and context added once, reused every time.'},
    Quality:{name:'Getting reliable output',fix:'Give Claude the right tools — web search, code — and clear criteria to check its own work against.'},
    Strategy:{name:'Right-sizing the tool',fix:'Match the tool to the job: a quick reword is a chat; a recurring workstream is a Project, a Skill, or Cowork.'}
  };

  var Q = {
    S1:{sec:'about',scored:false,type:'choice',prompt:'How often do you use Claude?',options:['Just looking around','Used it a few weeks','A few months in','Daily — every workday']},
    S2:{sec:'about',scored:false,type:'slider',prompt:'How do you set Claude up before asking?',left:'I just start typing',right:'I give it context first'},
    S3:{sec:'about',scored:false,type:'choice',prompt:'What do you use Claude for most?',options:['Writing and editing','Research','Meeting notes','Strategy and decisions','Summarizing documents','Not for work yet']},

    Q1:{sec:'beginner',gap:'Context',prompt:'Claude gives you a boring draft. What do you type back?',options:['“Make it better”','“Make it sound less like AI”','“Here’s who it’s for, plus two examples of the tone I want”','“Nothing — you try a different AI”'],correct:2},
    Q2:{sec:'beginner',gap:'Context',prompt:'Claude’s answer feels generic. What’s usually the reason?',options:['Claude can’t give deep answers','You didn’t tell it enough about your situation','You’re on the wrong model','The topic is too specific'],correct:1},
    Q3:{sec:'beginner',gap:'Context',prompt:'What improves Claude’s output the most?',options:['Being polite to it','Telling it your goal and audience','Writing a longer prompt','Adding “be detailed”'],correct:1},
    Q4:{sec:'beginner',gap:'Context',prompt:'Claude misunderstood your request. What’s the best next step?',options:['Send the exact same message again','Just say “no, that’s wrong”','Explain what you actually meant','Give up and do it yourself'],correct:2},
    Q5:{sec:'beginner',gap:'Context',context:'You have a screenshot of an error message.',prompt:'Can you just show Claude an image instead of typing it out?',options:['No, Claude only reads text','Yes — paste the screenshot in','Only if you describe it too','Only in the desktop app'],correct:1},

    Q6:{sec:'practical',gap:'Voice',prompt:'You want Claude to write in your voice. What do you give it?',options:['A description of your tone — “warm and clear”','Three of your real emails — “write like these”'],correct:1},
    Q7:{sec:'practical',gap:'Context',prompt:'You want Claude to work from your 30-page PDF. What do you do?',options:['Describe the PDF from memory','Upload the PDF file','Paste in whatever fits','Ask what’s usually in a PDF like that'],correct:1},
    Q8:{sec:'practical',gap:'Workflow',prompt:'Claude can make an editable document beside the chat. What’s it called?',options:['A file','An Artifact','A Project','An export'],correct:1},
    Q9:{sec:'practical',gap:'Workflow',prompt:'Which of these does NOT need an Artifact?',options:['A document your team will keep editing','An article you’ll publish','A quick “what’s a good subject line?”','A tool you’ll keep refining'],correct:2},
    Q10:{sec:'practical',gap:'Quality',context:'You need this morning’s news, not general knowledge.',prompt:'You need up-to-date info from today. What do you do?',options:['Trust whatever Claude remembers','Turn on web search','Ask it to guess the latest','Assume it can’t help'],correct:1},
    Q11:{sec:'practical',gap:'Quality',prompt:'How do you get Claude to properly check its own work?',options:['Say “double-check that”','Ask it to rate itself 1–10','Give it clear things to check against','Just run it twice'],correct:2},

    Q12:{sec:'workflow',gap:'Workflow',prompt:'You write the same report every week. What’s your setup?',options:['A new chat each time — re-paste everything','One Project you reuse — just add this week’s numbers'],correct:1},
    Q13:{sec:'workflow',gap:'Workflow',prompt:'You explain your job to Claude in every new chat. What should you do?',options:['Write an even longer intro','Keep it all in one endless chat','Put it in a Project once','Re-paste a background doc each time'],correct:2},
    Q14:{sec:'workflow',gap:'Workflow',prompt:'You use the same files in lots of chats. Where should they live?',options:['Re-upload them in every chat','In the Project, added once','Pasted as text each time','In a separate notes app'],correct:1},
    Q15:{sec:'workflow',gap:'Workflow',prompt:'When is a plain single chat the better choice?',options:['A one-off task you won’t repeat','Recurring work with shared context','Tasks that reuse the same files','Work your team needs to inherit'],correct:0},
    Q16:{sec:'workflow',gap:'Workflow',context:'The conversation has drifted for an hour.',prompt:'Your long chat has gone off track. What’s the smart move?',options:['Keep pushing in the same chat','Never start over — you’d lose context','Start fresh when old context is hurting you','Delete it and hope'],correct:2},
    Q17:{sec:'workflow',gap:'Workflow',prompt:'You found a prompt that works great. How do you keep the value?',options:['Screenshot the chat','Save it as reusable Project instructions','Try to remember it next time','Paste it into notes'],correct:1},
    Q18:{sec:'workflow',gap:'Workflow',prompt:'You want Claude to remember your preferences over time. What helps?',options:['Nothing — it can’t remember','Turning on memory','Saying “remember this” each time','Keeping one chat open forever'],correct:1},

    Q19:{sec:'advanced',gap:'Context',prompt:'Claude’s answer sounds right but misses your business reality. What went wrong?',options:['It made things up','You never gave it the goal, customer, or an example','You were on the wrong model','Claude can’t handle strategy'],correct:1},
    Q20:{sec:'advanced',gap:'Quality',context:'You upload a messy 5,000-row spreadsheet.',prompt:'You need real totals and a chart from the data. What can Claude do?',options:['Only explain the Excel steps','Estimate the numbers by eye','Run code and return the real results','Nothing — that’s not its job'],correct:2},
    Q21:{sec:'advanced',gap:'Workflow',prompt:'You want to package a reusable process for Claude. What feature is that?',options:['A Project instruction','A Skill','A saved prompt','An Artifact'],correct:1},
    Q22:{sec:'advanced',gap:'Workflow',prompt:'You want Claude to act across your desktop. Which do you use?',options:['The desktop app','A browser tab','They both do the same thing','Neither — it only reads pasted text'],correct:0},
    Q23:{sec:'advanced',gap:'Strategy',prompt:'Which task is being over-engineered?',options:['A team process → build a Skill','Weekly report → make a Project','“Reword this sentence” → build a Project','A 40-page PDF → upload the file'],correct:2},

    Q24:{sec:'expert',gap:'Workflow',prompt:'You have a big, multi-step project to work through. Where do you run it?',options:['In chat, one prompt at a time','In Cowork','In one giant prompt','Across ten separate chats'],correct:1},
    Q25:{sec:'expert',gap:'Workflow',prompt:'What’s the most powerful thing an Artifact can be?',options:['A place for Claude’s longer answers','Text you copy out elsewhere','A working, interactive tool','A backup of the chat'],correct:2},
    Q26:{sec:'expert',gap:'Strategy',context:'Someone asks for “a way to explore the numbers.”',prompt:'What’s the power-user move here?',options:['Build a dashboard they can click through','Write a long written report','List the numbers in a table','Tell them to open Excel'],correct:0},
    Q27:{sec:'expert',gap:'Workflow',prompt:'What’s the real difference between chat and Cowork?',options:['Cowork is just a bigger chat window','Cowork runs multi-step work on its own','Chat is only for coding','There’s no real difference'],correct:1},
    Q28:{sec:'expert',gap:'Workflow',prompt:'You have a big workstream you’ll run again and again. What do you do?',options:['Hunt for one perfect prompt','Combine the tools: a Project, files, a Skill, and Cowork','Keep it all in one long chat','Switch between AI tools depending on mood'],correct:1}
  };

  var FLOW = ['intro','S1','S2','S3','Q1','Q2','Q3','Q4','Q5','Q6','Q7','Q8','Q9','Q10','Q11','break1','Q12','Q13','Q14','Q15','Q16','Q17','Q18','Q19','Q20','Q21','Q22','Q23','break2','Q24','Q25','Q26','Q27','Q28','result','email','confirm'];
  var SEC = [['Beginner','beginner'],['Practical','practical'],['Workflow','workflow'],['Advanced','advanced'],['Expert','expert']];

  var CONFETTI = Array.from({length:18},function(_,i){
    var cols=['var(--ac,#D97757)','var(--acD,#C15F3C)','#E0A98E','#CFC8B4','#21201C'];
    var c=cols[i%5], left=(i*5.4+3)%97, w=7+(i%3)*2, h=8+(i%4)*5, dur=(1.5+(i%5)*0.28).toFixed(2), del=(i*0.05).toFixed(2), rot=i*37;
    return {style:'position:absolute;top:-14px;left:'+left+'%;width:'+w+'px;height:'+h+'px;background:'+c+';border-radius:2px;opacity:0;transform:rotate('+rot+'deg);animation:confFall '+dur+'s cubic-bezier(.2,.6,.4,1) '+del+'s forwards;'};
  });

  // ---- State ----
  var state = { step:0, answers:{}, email:'', sent:false, locking:false, animA:true, displayScore:0 };
  var iv = null;
  var lastRenderedStep = -1;
  var app = document.getElementById('app');

  // ---- Persistence ----
  function persist(){ try{ localStorage.setItem('claudeQuizV2',JSON.stringify({step:state.step,answers:state.answers,email:state.email,sent:state.sent})); }catch(e){} }
  function load(){
    try{
      var s=JSON.parse(localStorage.getItem('claudeQuizV2')||'null');
      if(s&&typeof s.step==='number'){
        state.step=s.step; state.answers=s.answers||{}; state.email=s.email||''; state.sent=!!s.sent;
      }
    }catch(e){}
  }

  // ---- Logic ----
  function score(){ var s=0; Object.keys(Q).forEach(function(id){var q=Q[id]; if(q.scored!==false){var a=state.answers[id]; if(a&&a.idx===q.correct)s++;}}); return s; }
  function level(){ var s=score(); return s<=7?1:s<=15?2:s<=22?3:4; }
  function biggestGap(){
    var miss={};
    Object.keys(Q).forEach(function(id){var q=Q[id]; if(q.scored!==false){var a=state.answers[id]; if(!a||a.idx!==q.correct){miss[q.gap]=(miss[q.gap]||0)+1;}}});
    var best=null,n=0;
    ['Context','Voice','Workflow','Quality','Strategy'].forEach(function(g){ if((miss[g]||0)>n){n=miss[g];best=g;} });
    return best;
  }
  function emailValid(){ return /.+@.+\..+/.test((state.email||'').trim()); }

  function themeTokens(){
    var t=PROPS.theme||'Warm';
    if(t==='Cool gray') return {bg:'#F4F5F6',card:'#FFFFFF',line:'#E6E8EB',ink:'#1B1D21',mut:'#828892',soft:'#FBFBFC'};
    if(t==='Mono') return {bg:'#F5F4F2',card:'#FFFFFF',line:'#E8E6E2',ink:'#1A1A19',mut:'#8B8985',soft:'#FAFAF8'};
    return {bg:'#F1EDE4',card:'#FFFFFF',line:'#EAE5D9',ink:'#21201C',mut:'#7C786D',soft:'#FAF7F1'};
  }
  function accentTokens(){
    var a=PROPS.accent||'#D97757';
    var map={'#D97757':'#C15F3C','#4A6CF0':'#3550C8','#3E9B72':'#2F7D5B','#2A2A28':'#141413'};
    return {ac:a,acD:map[a]||a};
  }

  // ---- Transitions ----
  function next(){ state.step=Math.min(state.step+1,FLOW.length-1); state.animA=!state.animA; render(); persist(); if(FLOW[state.step]==='result') animateScore(); }
  function back(){ state.step=Math.max(state.step-1,0); state.animA=!state.animA; render(); persist(); }
  function choose(i){
    if(state.locking) return;
    var id=FLOW[state.step];
    state.answers[id]={idx:i};
    if(PROPS.autoAdvance!==false){
      state.locking=true; render(); persist();
      setTimeout(function(){ state.locking=false; next(); },400);
    } else {
      render(); persist();
    }
  }
  function sliderContinue(){
    var id=FLOW[state.step];
    if(!state.answers[id]){ state.answers[id]={idx:3,val:3}; persist(); next(); }
    else next();
  }
  function submitEmail(){ if(!emailValid())return; state.sent=true; render(); persist(); next(); }
  function restart(){ clearInterval(iv); state.step=0; state.answers={}; state.email=''; state.sent=false; state.displayScore=0; state.animA=!state.animA; render(); persist(); }

  function animateScore(){
    var target=score();
    clearInterval(iv);
    state.displayScore=0;
    updateScoreDOM();
    if(target<=0)return;
    var cur=0;
    iv=setInterval(function(){
      cur++;
      if(cur>=target){cur=target;clearInterval(iv);}
      state.displayScore=cur;
      updateScoreDOM();
    }, Math.max(28,900/target));
  }
  function updateScoreDOM(){
    var sc=document.getElementById('cq-score');
    var ring=document.getElementById('cq-ring');
    if(sc) sc.textContent=state.displayScore;
    if(ring){ var deg=Math.round((state.displayScore/28)*360)+'deg'; ring.style.background='conic-gradient(var(--ac,#D97757) '+deg+',var(--line,#E2DDCE) 0)'; }
  }

  // ---- View helpers ----
  function computeVals(){
    var st=state.step, id=FLOW[st];
    var cardStyle=PROPS.cardStyle||'Outlined';
    var serif=PROPS.serifHeadings!==false;
    var auto=PROPS.autoAdvance!==false;
    var th=themeTokens(), acc=accentTokens();

    var isIntro=id==='intro', isBreak=id==='break1'||id==='break2', isResult=id==='result', isEmail=id==='email', isConfirm=id==='confirm';
    var isQuestion=!isIntro&&!isBreak&&!isResult&&!isEmail&&!isConfirm;
    var q=isQuestion?Q[id]:null;
    var isSlider=!!(q&&q.type==='slider');
    var isChoice=!!(q&&q.type!=='slider');

    var qKeys=Object.keys(Q);
    var scoredIds=qKeys.filter(function(k){return Q[k].scored!==false;});
    var curSecKey=q?q.sec:(id==='break1'?'workflow':id==='break2'?'expert':'about');
    var secList=['beginner','practical','workflow','advanced','expert'];
    var curSecIdx=secList.indexOf(curSecKey);
    var sections=SEC.map(function(s,i){
      var stt=curSecIdx<0?'todo':(i<curSecIdx?'done':i===curSecIdx?'active':'todo');
      var dot,inner='',lab;
      if(stt==='done'){ dot='width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--ac,#D97757);color:#fff;font:700 10px sans-serif;'; inner='✓'; lab='color:var(--mut,#8A867A);font-weight:600;'; }
      else if(stt==='active'){ dot='width:20px;height:20px;border-radius:50%;background:var(--card,#fff);border:2px solid var(--ac,#D97757);box-shadow:0 0 0 4px rgba(217,119,87,.14);'; lab='color:var(--ink,#21201C);font-weight:700;'; }
      else { dot='width:20px;height:20px;border-radius:50%;background:var(--bg,#EFECE3);border:2px solid var(--line,#DED9CB);'; lab='color:var(--mut,#B0AB9C);font-weight:600;'; }
      return {label:s[0],dotStyle:dot,dotInner:inner,labelStyle:lab};
    });
    var trackPct=(curSecIdx<0?0:(curSecIdx/4)*100)+'%';

    var counterText='';
    if(q){ if(q.scored===false){ counterText='Setup '+(['S1','S2','S3'].indexOf(id)+1)+' of 3'; } else { counterText='Question '+(scoredIds.indexOf(id)+1)+' of 28'; } }
    else if(id==='break1'){ counterText='Halfway there'; }
    else if(id==='break2'){ counterText='Final stretch'; }

    var answered=q?state.answers[id]:null;
    function mkOpt(t,i){
      var sel=answered&&answered.idx===i;
      var bg,bd,sh;
      if(cardStyle==='Filled'){ bg=sel?'var(--soft,#FBEEE9)':'var(--soft,#FAF7F1)'; bd='1.5px solid '+(sel?'var(--ac,#D97757)':'transparent'); sh='none'; }
      else if(cardStyle==='Elevated'){ bg='var(--card,#fff)'; bd='1px solid '+(sel?'var(--ac,#D97757)':'var(--line,#E7E3D7)'); sh=sel?'0 0 0 1.5px var(--ac,#D97757),0 6px 16px rgba(0,0,0,.08)':'0 1px 2px rgba(0,0,0,.04)'; }
      else { bg=sel?'var(--soft,#FBEEE9)':'var(--card,#fff)'; bd='1.5px solid '+(sel?'var(--ac,#D97757)':'var(--line,#E7E3D7)'); sh='none'; }
      var style='display:flex;align-items:center;gap:14px;width:100%;text-align:left;padding:15px 16px;border-radius:12px;border:'+bd+';background:'+bg+';box-shadow:'+sh+';cursor:pointer;font:500 16px/1.35 \'Hanken Grotesk\',sans-serif;color:var(--ink,#21201C);transition:transform .15s,box-shadow .15s,border-color .15s,background .15s;';
      var badge='flex:none;width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font:700 12px \'Hanken Grotesk\';transition:transform .16s,background .16s,color .16s;'+(sel?'background:var(--ac,#D97757);color:#fff;':'background:var(--soft,#EDE9DC);color:var(--mut,#8A867A);');
      var check='flex:none;font-size:14px;color:var(--ac,#D97757);'+(sel?'opacity:1;':'opacity:0;');
      return {text:t,letter:String.fromCharCode(65+i),style:style,badge:badge,check:check,sel:sel,i:i};
    }
    var options=isChoice?q.options.map(mkOpt):[];

    var sv=(answered&&answered.val)||3;
    var sliderFill=(((sv-1)/4)*100)+'%';

    var lvl=L[level()], sc=score(), gk=biggestGap();
    var gap=gk?GAP[gk]:{name:'No obvious weak spot',fix:'You’re barely missing anything — your next gains come from combining tools on bigger workstreams.'};
    var ringDeg=Math.round((state.displayScore/28)*360)+'deg';

    return {
      ac:acc.ac, acD:acc.acD, bg:th.bg, card:th.card, line:th.line, ink:th.ink, mut:th.mut, soft:th.soft,
      disp: serif?"'Newsreader',Georgia,serif":"'Hanken Grotesk',sans-serif", dispW: serif?'400':'800',
      animName:state.animA?'scIn1':'scIn2',
      showProgress:isQuestion||isBreak, isStepper:(PROPS.progressStyle||'Stepper')==='Stepper', isSlim:(PROPS.progressStyle||'Stepper')!=='Stepper',
      sections:sections, trackPct:trackPct, counterText:counterText,
      canBack:(isQuestion||isBreak)&&st>0,
      isIntro:isIntro, isQuestion:isQuestion, isBreak:isBreak, isResult:isResult, isEmail:isEmail, isConfirm:isConfirm, isChoice:isChoice, isSlider:isSlider,
      sectionTag: q?(q.scored===false?'About you':q.sec.toUpperCase()+' · '+id):'',
      prompt: q?q.prompt:'',
      hasContext:!!(q&&q.context), contextText:q?q.context:'',
      options:options, showChoiceContinue: isChoice&&!auto&&!!answered,
      sliderVal:sv, sliderFill:sliderFill, sliderLeft:q?q.left:'', sliderRight:q?q.right:'',
      breakHeading: id==='break1'?'Halfway. You’re beating most daily users.':'Final stretch. This is where it gets hard.',
      breakBody: id==='break1'?'That part was easy on purpose. Now it gets real: do you have a system, or just a pile of chats?':'These last questions separate people who use Claude a lot from real power users. Most people miss at least one.',
      breakBtn: id==='break1'?'I’m ready →':'Bring it on →',
      levelNum:lvl.num, levelName:lvl.name, diagnosis:lvl.diag, ringDeg:ringDeg,
      gapName:gap.name, gapFix:gap.fix,
      email:state.email, submitStyle:emailValid()?'':'opacity:.5;pointer-events:none;',
      confirmSubject:lvl.subject
    };
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function progressHTML(V){
    if(!V.showProgress) return '';
    var inner='';
    if(V.isStepper){
      var dots='';
      V.sections.forEach(function(s){
        dots+='<div style="display:flex;flex-direction:column;align-items:center;gap:9px;">'
          +'<div style="'+s.dotStyle+'">'+s.dotInner+'</div>'
          +'<span style="font:12px \'Hanken Grotesk\';'+s.labelStyle+'">'+esc(s.label)+'</span></div>';
      });
      inner='<div style="position:relative;padding:0 9px;">'
        +'<div style="position:absolute;left:18px;right:18px;top:9px;height:2px;background:var(--line,#E7E3D7);border-radius:2px;"></div>'
        +'<div style="position:absolute;left:18px;top:9px;height:2px;background:var(--ac,#D97757);border-radius:2px;width:'+V.trackPct+';transition:width .5s cubic-bezier(.4,0,.2,1);"></div>'
        +'<div style="position:relative;display:flex;justify-content:space-between;">'+dots+'</div></div>';
    } else {
      inner='<div style="height:6px;border-radius:99px;background:var(--line,#E7E3D7);overflow:hidden;">'
        +'<div style="height:100%;border-radius:99px;background:var(--ac,#D97757);width:'+V.trackPct+';transition:width .5s cubic-bezier(.4,0,.2,1);"></div></div>';
    }
    return '<div style="width:100%;max-width:640px;padding:26px 2px 4px;">'
      +'<div style="display:flex;align-items:center;gap:9px;margin-bottom:18px;">'
      +'<span style="width:16px;height:16px;border-radius:5px;background:var(--ac,#D97757);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:10px;">✳</span>'
      +'<span style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.16em;text-transform:uppercase;color:var(--mut,#8A867A);">Claude Skills Assessment</span>'
      +'<span style="margin-left:auto;font:600 13px \'Hanken Grotesk\';color:var(--mut,#8A867A);">'+esc(V.counterText)+'</span></div>'
      +inner+'</div>';
  }

  function introHTML(){
    var items=['Your Claude level','Your biggest mistake','Your weakest skill area','The exact resources to fix your level'];
    var rows='';
    items.forEach(function(t){
      rows+='<div style="display:flex;align-items:center;gap:12px;font:500 16px \'Hanken Grotesk\';"><span style="flex:none;width:6px;height:6px;border-radius:2px;background:var(--ac,#D97757);"></span>'+esc(t)+'</div>';
    });
    return '<div style="text-align:center;padding:6px 0 16px;">'
      +'<div style="display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border-radius:99px;background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);margin-bottom:30px;">'
      +'<span style="width:16px;height:16px;border-radius:5px;background:var(--ac,#D97757);display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:10px;">✳</span>'
      +'<span style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.14em;text-transform:uppercase;color:var(--mut,#8A867A);">3-Minute Diagnostic</span></div>'
      +'<h1 style="font-family:var(--disp,\'Newsreader\',Georgia,serif);font-weight:var(--dispW,400);font-size:clamp(40px,7vw,62px);line-height:1.0;letter-spacing:-.02em;margin:0 0 20px;">How Bad Are You<br>at <span style="font-style:italic;color:var(--ac,#D97757);">Claude</span>?</h1>'
      +'<p style="font:400 19px/1.5 \'Hanken Grotesk\';color:var(--mut,#5A564C);max-width:470px;margin:0 auto 34px;">Find your Claude level, your biggest mistake, and the exact resources to fix it.</p>'
      +'<div style="max-width:400px;margin:0 auto 36px;text-align:left;background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:16px;padding:22px 24px;">'
      +'<div style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.12em;text-transform:uppercase;color:var(--mut,#8A867A);margin-bottom:15px;">You’ll get</div>'
      +'<div style="display:flex;flex-direction:column;gap:13px;">'+rows+'</div></div>'
      +'<button data-action="next" class="cq-tap-lift" style="display:inline-flex;align-items:center;gap:10px;background:var(--ac,#D97757);color:#fff;border:none;padding:16px 32px;border-radius:12px;font:700 18px \'Hanken Grotesk\';cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.12);transition:filter .15s,transform .15s;">Start quiz →</button>'
      +'<div style="margin-top:20px;font:500 14px \'Hanken Grotesk\';color:var(--mut,#A29D8E);">28 questions · ~3 minutes · progress saved</div></div>';
  }

  function questionHTML(V){
    var h='<div>'
      +'<div style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.16em;text-transform:uppercase;color:var(--ac,#D97757);margin-bottom:16px;">'+esc(V.sectionTag)+'</div>'
      +'<h2 style="font:700 clamp(25px,4vw,32px)/1.22 \'Hanken Grotesk\';letter-spacing:-.01em;margin:0;">'+esc(V.prompt)+'</h2>';
    if(V.hasContext){
      h+='<div style="display:flex;align-items:center;gap:10px;margin-top:16px;padding:10px 14px;border-radius:10px;background:var(--soft,#FAF7F1);border:1px solid var(--line,#E7E3D7);">'
        +'<span style="font:800 9px/1 \'Hanken Grotesk\';letter-spacing:.12em;text-transform:uppercase;color:var(--ac,#D97757);border:1px solid var(--ac,#D97757);border-radius:5px;padding:4px 6px;">Context</span>'
        +'<span style="font:500 14px \'Hanken Grotesk\';color:var(--mut,#5A564C);">'+esc(V.contextText)+'</span></div>';
    }
    if(V.isChoice){
      var opts='';
      V.options.forEach(function(o){
        opts+='<button class="cq-opt'+(o.sel?' cq-sel':'')+'" data-action="choose" data-i="'+o.i+'" style="'+o.style+'">'
          +'<span class="cq-badge" style="'+o.badge+'">'+esc(o.letter)+'</span>'
          +'<span style="flex:1;">'+esc(o.text)+'</span>'
          +'<span style="'+o.check+'">✓</span></button>';
      });
      h+='<div style="display:flex;flex-direction:column;gap:10px;margin-top:22px;">'+opts+'</div>';
      if(V.showChoiceContinue){
        h+='<button data-action="next" class="cq-tap" style="margin-top:18px;width:100%;background:var(--ac,#D97757);color:#fff;border:none;padding:15px;border-radius:12px;font:700 16px \'Hanken Grotesk\';cursor:pointer;transition:filter .15s;">Continue →</button>';
      }
    }
    if(V.isSlider){
      h+='<div style="margin-top:30px;background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:16px;padding:28px 26px;">'
        +'<div style="display:flex;justify-content:center;margin-bottom:22px;"><span id="cq-slider-val" style="font-family:var(--disp,\'Newsreader\',serif);font-size:46px;line-height:1;color:var(--ac,#D97757);">'+V.sliderVal+'</span></div>'
        +'<input id="cq-slider" type="range" min="1" max="5" step="1" value="'+V.sliderVal+'" style="width:100%;--fill:'+V.sliderFill+';">'
        +'<div style="display:flex;justify-content:space-between;margin-top:14px;font:500 14px \'Hanken Grotesk\';color:var(--mut,#8A867A);">'
        +'<span style="max-width:44%;">'+esc(V.sliderLeft)+'</span><span style="max-width:44%;text-align:right;">'+esc(V.sliderRight)+'</span></div>'
        +'<button data-action="sliderContinue" class="cq-tap" style="margin-top:26px;width:100%;background:var(--ac,#D97757);color:#fff;border:none;padding:15px;border-radius:12px;font:700 16px \'Hanken Grotesk\';cursor:pointer;transition:filter .15s;">Continue →</button></div>';
    }
    h+='</div>';
    return h;
  }

  function breakHTML(V){
    return '<div style="text-align:center;background:var(--ink,#21201C);border-radius:22px;padding:52px 40px;">'
      +'<div style="display:inline-flex;align-items:center;gap:8px;padding:6px 14px;border-radius:99px;background:rgba(255,255,255,.1);margin-bottom:24px;">'
      +'<span style="width:6px;height:6px;border-radius:50%;background:var(--ac,#D97757);"></span>'
      +'<span style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.14em;text-transform:uppercase;color:var(--ac,#E0956F);">'+esc(V.counterText)+'</span></div>'
      +'<h2 style="font-family:var(--disp,\'Newsreader\',serif);font-weight:var(--dispW,400);font-size:clamp(28px,5vw,40px);line-height:1.14;color:#F5F2EA;margin:0 0 18px;letter-spacing:-.01em;">'+esc(V.breakHeading)+'</h2>'
      +'<p style="font:400 18px/1.55 \'Hanken Grotesk\';color:rgba(245,242,234,.66);max-width:440px;margin:0 auto 32px;">'+esc(V.breakBody)+'</p>'
      +'<button data-action="next" class="cq-tap-bright" style="background:var(--ac,#D97757);color:#fff;border:none;padding:15px 32px;border-radius:12px;font:700 17px \'Hanken Grotesk\';cursor:pointer;transition:filter .15s,transform .15s;">'+esc(V.breakBtn)+'</button></div>';
  }

  function resultHTML(V){
    var conf='';
    CONFETTI.forEach(function(c){ conf+='<span style="'+c.style+'"></span>'; });
    return '<div style="position:relative;text-align:center;">'
      +'<div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;">'+conf+'</div>'
      +'<div style="position:relative;">'
      +'<div style="display:inline-block;padding:7px 15px;border-radius:99px;background:var(--ac,#D97757);color:#fff;font:800 12px/1 \'Hanken Grotesk\';letter-spacing:.12em;text-transform:uppercase;margin-bottom:22px;animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both;">Level '+V.levelNum+' of 4</div>'
      +'<h1 style="font-family:var(--disp,\'Newsreader\',serif);font-weight:var(--dispW,400);font-size:clamp(34px,6vw,52px);line-height:1.06;letter-spacing:-.02em;margin:0 0 16px;">'+esc(V.levelName)+'</h1>'
      +'<p style="font:400 18px/1.55 \'Hanken Grotesk\';color:var(--mut,#5A564C);max-width:460px;margin:0 auto 30px;">'+esc(V.diagnosis)+'</p>'
      +'<div style="display:flex;justify-content:center;margin-bottom:32px;">'
      +'<div id="cq-ring" style="position:relative;width:128px;height:128px;border-radius:50%;background:conic-gradient(var(--ac,#D97757) '+V.ringDeg+',var(--line,#E2DDCE) 0);display:flex;align-items:center;justify-content:center;">'
      +'<div style="width:106px;height:106px;border-radius:50%;background:var(--bg,#EFECE3);display:flex;flex-direction:column;align-items:center;justify-content:center;">'
      +'<span id="cq-score" style="font-family:var(--disp,\'Newsreader\',serif);font-size:42px;line-height:1;">'+state.displayScore+'</span>'
      +'<span style="font:700 11px \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:var(--mut,#A29D8E);margin-top:3px;">of 28</span></div></div></div>'
      +'<div style="display:grid;gap:12px;max-width:480px;margin:0 auto 32px;text-align:left;">'
      +'<div style="background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:14px;padding:18px 20px;">'
      +'<div style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.12em;text-transform:uppercase;color:var(--mut,#B0AB9C);margin-bottom:8px;">Your weakest area</div>'
      +'<div style="font:700 19px \'Hanken Grotesk\';color:var(--ac,#C15F3C);">'+esc(V.gapName)+'</div></div>'
      +'<div style="background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:14px;padding:18px 20px;">'
      +'<div style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.12em;text-transform:uppercase;color:var(--mut,#B0AB9C);margin-bottom:8px;">Your first fix</div>'
      +'<div style="font:500 16px/1.5 \'Hanken Grotesk\';color:var(--ink,#3A372F);">'+esc(V.gapFix)+'</div></div></div>'
      +'<button data-action="next" class="cq-tap-lift" style="background:var(--ac,#D97757);color:#fff;border:none;padding:16px 32px;border-radius:12px;font:700 18px \'Hanken Grotesk\';cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.12);transition:filter .15s,transform .15s;">Get my full fix plan →</button>'
      +'<div style="margin-top:18px;"><button data-action="restart" class="cq-restart" style="background:none;border:none;cursor:pointer;color:var(--mut,#A29D8E);font:600 14px \'Hanken Grotesk\';">Retake the quiz</button></div>'
      +'</div></div>';
  }

  function emailHTML(V){
    return '<div style="text-align:center;">'
      +'<div style="display:inline-block;padding:7px 14px;border-radius:99px;background:var(--soft,#FBEEE9);color:var(--acD,#C15F3C);font:700 12px/1 \'Hanken Grotesk\';letter-spacing:.04em;margin-bottom:22px;">Level '+V.levelNum+' · '+esc(V.levelName)+'</div>'
      +'<h1 style="font-family:var(--disp,\'Newsreader\',serif);font-weight:var(--dispW,400);font-size:clamp(30px,5.2vw,44px);line-height:1.1;letter-spacing:-.02em;margin:0 0 16px;">Your full fix plan is ready.</h1>'
      +'<p style="font:400 18px/1.55 \'Hanken Grotesk\';color:var(--mut,#5A564C);max-width:440px;margin:0 auto 32px;">A 7-day plan built for your level, matched to exactly how you answered.</p>'
      +'<div style="max-width:420px;margin:0 auto;background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:16px;padding:24px;">'
      +'<input id="cq-email" class="cq-email" type="email" value="'+esc(V.email)+'" placeholder="you@work.com" style="width:100%;padding:15px 16px;border-radius:11px;border:1.5px solid var(--line,#E2DDCE);background:var(--soft,#FCFBF7);font:500 16px \'Hanken Grotesk\';color:var(--ink,#21201C);outline:none;transition:border-color .15s,box-shadow .15s;">'
      +'<button data-action="submit" class="cq-tap" style="margin-top:12px;width:100%;background:var(--ac,#D97757);color:#fff;border:none;padding:16px;border-radius:11px;font:700 17px \'Hanken Grotesk\';cursor:pointer;transition:filter .15s,transform .15s;'+V.submitStyle+'">Send it →</button>'
      +'<div style="margin-top:14px;font:500 13px \'Hanken Grotesk\';color:var(--mut,#B0AB9C);">No spam. Just your plan and the resources to fix your level.</div></div></div>';
  }

  function confirmHTML(V){
    return '<div style="text-align:center;">'
      +'<div style="width:64px;height:64px;border-radius:50%;background:var(--ac,#D97757);display:flex;align-items:center;justify-content:center;margin:0 auto 26px;color:#fff;font-size:30px;animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both;">✓</div>'
      +'<h1 style="font-family:var(--disp,\'Newsreader\',serif);font-weight:var(--dispW,400);font-size:clamp(30px,5.2vw,44px);line-height:1.1;letter-spacing:-.02em;margin:0 0 16px;">Your plan is on its way.</h1>'
      +'<p style="font:400 18px/1.55 \'Hanken Grotesk\';color:var(--mut,#5A564C);max-width:420px;margin:0 auto 28px;">We just sent your 7-day plan to <strong style="color:var(--ink,#21201C);">'+esc(V.email)+'</strong>. Look for it in the next couple of minutes.</p>'
      +'<div style="max-width:440px;margin:0 auto 30px;text-align:left;background:var(--card,#fff);border:1px solid var(--line,#E7E3D7);border-radius:14px;padding:18px 20px;">'
      +'<div style="display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--line,#EEE9DE);margin-bottom:14px;">'
      +'<span style="width:34px;height:34px;border-radius:9px;background:var(--soft,#FBEEE9);color:var(--ac,#D97757);display:flex;align-items:center;justify-content:center;font-size:15px;">✳</span>'
      +'<div><div style="font:700 13px \'Hanken Grotesk\';color:var(--ink,#21201C);">Claude Skills</div>'
      +'<div style="font:500 12px \'Hanken Grotesk\';color:var(--mut,#A29D8E);">to '+esc(V.email)+'</div></div></div>'
      +'<div style="font:700 11px/1 \'Hanken Grotesk\';letter-spacing:.1em;text-transform:uppercase;color:var(--mut,#B0AB9C);margin-bottom:6px;">Subject</div>'
      +'<div style="font:600 16px/1.4 \'Hanken Grotesk\';color:var(--ink,#21201C);">'+esc(V.confirmSubject)+'</div></div>'
      +'<button data-action="restart" class="cq-restart-o" style="background:none;border:1px solid var(--line,#E7E3D7);cursor:pointer;color:var(--mut,#5A564C);font:600 15px \'Hanken Grotesk\';padding:12px 24px;border-radius:11px;transition:border-color .15s,color .15s;">Retake the quiz</button></div>';
  }

  function screenHTML(V){
    if(V.isIntro) return introHTML();
    if(V.isQuestion) return questionHTML(V);
    if(V.isBreak) return breakHTML(V);
    if(V.isResult) return resultHTML(V);
    if(V.isEmail) return emailHTML(V);
    if(V.isConfirm) return confirmHTML(V);
    return '';
  }

  function render(){
    var V=computeVals();
    var rootStyle='min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 48px;'
      +'background:var(--bg,#F1EDE4);color:var(--ink,#21201C);font-family:\'Hanken Grotesk\',system-ui,sans-serif;'
      +'--ac:'+V.ac+';--acD:'+V.acD+';--bg:'+V.bg+';--card:'+V.card+';--line:'+V.line+';--ink:'+V.ink+';--mut:'+V.mut+';--soft:'+V.soft+';--disp:'+V.disp+';--dispW:'+V.dispW+';';

    var back=V.canBack?'<button data-action="back" class="cq-back" style="align-self:flex-start;display:inline-flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;color:var(--mut,#8A867A);font:600 14px \'Hanken Grotesk\';padding:0 0 18px;transition:color .15s;">← Back</button>':'';

    // Only play the entrance animation on a real step change. Same-step
    // re-renders (e.g. highlighting a selected answer) must not replay it,
    // otherwise the screen visibly flashes/fades in again on every click.
    var animCss=(state.step!==lastRenderedStep)?'animation:.45s cubic-bezier(.22,.61,.36,1) both '+V.animName+';':'';

    app.setAttribute('style',rootStyle);
    app.innerHTML=progressHTML(V)
      +'<div style="width:100%;max-width:640px;flex:1;display:flex;flex-direction:column;justify-content:center;padding:24px 0;">'
      +'<div style="'+animCss+'">'
      +back+screenHTML(V)
      +'</div></div>';

    lastRenderedStep=state.step;
    bind();
  }

  function bind(){
    var els=app.querySelectorAll('[data-action]');
    els.forEach(function(el){
      var a=el.getAttribute('data-action');
      el.addEventListener('click',function(){
        if(a==='next') next();
        else if(a==='back') back();
        else if(a==='choose') choose(Number(el.getAttribute('data-i')));
        else if(a==='sliderContinue') sliderContinue();
        else if(a==='submit') submitEmail();
        else if(a==='restart') restart();
      });
    });
    var slider=document.getElementById('cq-slider');
    if(slider){
      var handler=function(e){
        var v=Number(e.target.value);
        var id=FLOW[state.step];
        state.answers[id]={idx:v,val:v};
        var valEl=document.getElementById('cq-slider-val');
        if(valEl) valEl.textContent=v;
        slider.style.setProperty('--fill',(((v-1)/4)*100)+'%');
        persist();
      };
      slider.addEventListener('input',handler);
      slider.addEventListener('change',handler);
    }
    var email=document.getElementById('cq-email');
    if(email){
      email.addEventListener('input',function(e){
        state.email=e.target.value;
        var btn=app.querySelector('[data-action="submit"]');
        if(btn){
          if(emailValid()){ btn.style.opacity=''; btn.style.pointerEvents=''; }
          else { btn.style.opacity='.5'; btn.style.pointerEvents='none'; }
        }
      });
      email.addEventListener('keydown',function(e){ if(e.key==='Enter') submitEmail(); });
    }
  }

  // ---- Boot ----
  load();
  render();
  if(FLOW[state.step]==='result') animateScore();

})();
</script>
</body>
</html>
