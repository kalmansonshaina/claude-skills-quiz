name = "claude-quiz-capture"
main = "src/index.js"
compatibility_date = "2024-11-01"

# The lead log. Create it once with:
#   npx wrangler kv namespace create LEADS
# then paste the returned id below.
[[kv_namespaces]]
binding = "LEADS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Lock this down to your site's origin in production (recommended).
ALLOWED_ORIGIN = "https://kalmansonshaina.github.io"

# Secrets (do NOT put these here — set them with `wrangler secret put`):
#   LOOPS_API_KEY   — from Loops → Settings → API
#   EXPORT_TOKEN    — any long random string; needed to call GET /export
